<svg width="880" height="330" viewBox="0 0 880 330" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mono { font-family: 'SFMono-Regular', 'JetBrains Mono', Menlo, Consolas, monospace; }
    .mega { font-size: 96px; font-weight: 800; letter-spacing: -0.02em; fill: #e6edf3; }
    .ghost { font-size: 96px; font-weight: 800; letter-spacing: -0.02em; fill: none; stroke: #30363d; stroke-width: 1; }
    .dim   { font-size: 12px; letter-spacing: 0.42em; fill: #6e7681; }
    .micro { font-size: 10px; letter-spacing: 0.18em; fill: #484f58; }
    .tag   { font-size: 13px; letter-spacing: 0.05em; fill: #9da7b3; }
    .accent { fill: #58a6ff; }
    .accent-s { stroke: #58a6ff; }
    .line { stroke: #30363d; stroke-width: 1; }
    .grid { stroke: #21262d; stroke-width: 0.5; }
    @media (prefers-color-scheme: light) {
      .mega { fill: #1f2328; } .ghost { stroke: #d0d7de; }
      .dim { fill: #8c959f; } .micro { fill: #afb8c1; } .tag { fill: #57606a; }
      .accent { fill: #0969da; } .accent-s { stroke: #0969da; }
      .line { stroke: #d0d7de; } .grid { stroke: #eaeef2; }
    }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .scan { animation: scan 5s linear infinite; }
    @keyframes scan { from { transform: translateY(-40px); } to { transform: translateY(370px); } }
    .t1 { animation: rise .8s ease-out .15s both; }
    .t2 { animation: rise .8s ease-out .4s both; }
    .t3 { animation: rise .8s ease-out .65s both; }
    .t4 { animation: rise .8s ease-out .9s both; }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .tick { animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
  </style>

  <!-- grid field -->
  <g class="grid">
    <line x1="0" y1="82" x2="880" y2="82"/>
    <line x1="0" y1="164" x2="880" y2="164"/>
    <line x1="0" y1="246" x2="880" y2="246"/>
    <line x1="220" y1="0" x2="220" y2="330"/>
    <line x1="440" y1="0" x2="440" y2="330"/>
    <line x1="660" y1="0" x2="660" y2="330"/>
  </g>

  <!-- scanline -->
  <g class="scan"><rect x="0" y="0" width="880" height="26" fill="url(#fade)" opacity="0.14"/></g>
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset=".5" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- registration marks -->
  <g class="line">
    <path d="M20 28 h18 M20 28 v18"/>
    <path d="M860 28 h-18 M860 28 v18"/>
    <path d="M20 302 h18 M20 302 v-18"/>
    <path d="M860 302 h-18 M860 302 v-18"/>
  </g>

  <!-- meta annotations -->
  <text x="30" y="60" class="mono micro">N 31°  ///  UTC+8</text>
  <text x="850" y="60" text-anchor="end" class="mono micro">EST. MMXVI — PRESENT</text>
  <text x="30" y="296" class="mono micro tick">● LIVE</text>
  <text x="850" y="296" text-anchor="end" class="mono micro">PRIVATE BY DEFAULT</text>

  <!-- ghost echo + main type -->
  <text x="444" y="156" text-anchor="middle" class="mono ghost">DANIEL</text>
  <text x="440" y="152" text-anchor="middle" class="mono mega">DANIEL<tspan class="accent cursor">_</tspan></text>

  <text x="440" y="192" text-anchor="middle" class="mono dim">SYSTEMS  ·  SIGNALS  ·  AGENTS</text>

  <!-- four directions -->
  <g class="mono tag">
    <text x="110" y="252" text-anchor="middle" class="t1">network infra</text>
    <text x="330" y="252" text-anchor="middle" class="t2">market intelligence</text>
    <text x="550" y="252" text-anchor="middle" class="t3">native apps</text>
    <text x="770" y="252" text-anchor="middle" class="t4">llm agents</text>
  </g>
  <g class="accent-s" stroke-width="2">
    <line x1="86" y1="264" x2="134" y2="264" class="t1"/>
    <line x1="306" y1="264" x2="354" y2="264" class="t2"/>
    <line x1="526" y1="264" x2="574" y2="264" class="t3"/>
    <line x1="746" y1="264" x2="794" y2="264" class="t4"/>
  </g>
</svg>
